name: Grass Bot (Every 5 min)

on:
  schedule:
    - cron: "*/5 * * * *"  # 5分ごと（UTC）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update file
        run: |
          echo "update: $(date)" >> grass.txt

      - name: Commit changes
        run: |
          git config user.name "grass-bot"
          git config user.email "grass-bot@example.com"

          git add grass.txt
          git commit -m "chore: grow grass" || echo "No changes"

      - name: Push changes
        run: git push
