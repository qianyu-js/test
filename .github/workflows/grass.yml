name: Grass Bot

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: echo "update: $(date)" >> grass.txt

      - run: |
          git config user.name "grass-bot"
          git config user.email "grass-bot@example.com"

          git add grass.txt
          git commit -m "chore: grow grass" || echo "No changes"

      - run: git push
